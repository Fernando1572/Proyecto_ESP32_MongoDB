<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Registro de Sensores</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container mt-5">
      <div class="card shadow p-4">
        <h3 class="text-center mb-4">Registro de Lectura Sensor</h3>

        <form id="formLectura">
          <div class="mb-3">
            <label class="form-label">Sensor ID</label>
            <input type="text" class="form-control" id="sensorId" required />
          </div>

          <div class="mb-3">
            <label class="form-label">Temperatura</label>
            <input
              type="number"
              step="0.1"
              class="form-control"
              id="temperatura"
              required
            />
          </div>

          <div class="mb-3">
            <label class="form-label">Humedad</label>
            <input type="number" class="form-control" id="humedad" required />
          </div>

          <div class="mb-3">
            <label class="form-label">Ubicación</label>
            <input type="text" class="form-control" id="ubicacion" required />
          </div>

          <button type="submit" class="btn btn-primary w-100">Registrar</button>
        </form>

        <div id="mensaje" class="mt-3 text-center"></div>
      </div>
    </div>

    <script>
      document
        .getElementById("formLectura")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const datos = {
            sensorId: document.getElementById("sensorId").value,
            temperatura: document.getElementById("temperatura").value,
            humedad: document.getElementById("humedad").value,
            ubicacion: document.getElementById("ubicacion").value,
          };

          const respuesta = await fetch("/api/lecturas", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(datos),
          });

          const resultado = await respuesta.json();
          const mensajeDiv = document.getElementById("mensaje");

          if (respuesta.ok) {
            mensajeDiv.innerHTML = `<div class="alert alert-success">${resultado.mensaje}</div>`;
            document.getElementById("formLectura").reset();
          } else {
            mensajeDiv.innerHTML = `<div class="alert alert-danger">${resultado.mensaje}</div>`;
          }
        });
    </script>
  </body>
</html>
